name: Generate GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug environment
        env:
          GH_USERNAME: TeerthoRoyChoudhury
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          echo "USERNAME=$GH_USERNAME"

          if [ -n "$GH_TOKEN" ]; then
            echo "TOKEN EXISTS"
          else
            echo "TOKEN MISSING"
          fi

      - name: Generate stats SVG
        env:
          GH_USERNAME: TeerthoRoyChoudhury
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          node scripts/generate-stats.mjs

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist/stats.svg

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update stats.svg"
            git push
          fi
